name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            이 PR의 변경된 코드를 리뷰해줘.
            보안 취약점, 타입 안전성, 에러 핸들링을 중점적으로 검사해.

            각 문제는 아래 형식으로 작성해:
            **[심각도] 카테고리 — 제목**
            - 파일: `path/to/file.py:line`
            - 문제: 무엇이 잘못됐고 왜 문제인지
            - 수정: 구체적인 수정 코드 또는 방법

            심각도: CRITICAL / HIGH / MEDIUM / LOW / INFO
            마지막에 APPROVE / REQUEST CHANGES / DISCUSS 중 하나로 최종 판정을 내려줘.
